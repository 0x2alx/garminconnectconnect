services:
  timescaledb:
    image: timescale/timescaledb:latest-pg16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-garmin}
      POSTGRES_USER: ${POSTGRES_USER:-garmin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-garmin_secret}
    ports:
      - "5432:5432"
    volumes:
      - timescaledb_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-garmin}"]
      interval: 5s
      timeout: 5s
      retries: 5

  mongodb:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 5s
      retries: 5

  grafana:
    image: grafana/grafana:latest
    ports:
      - "${GRAFANA_PORT:-3001}:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_SECURITY_ADMIN_USER: admin
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-garmin_secret}
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
      - ./grafana/dashboards:/var/lib/grafana/dashboards
    depends_on:
      timescaledb:
        condition: service_healthy

  # ── Garmin Server (daemon mode) ──────────────────────────────────
  garmin-server:
    build: .
    env_file: .env
    environment:
      POSTGRES_HOST: timescaledb
      MONGO_HOST: mongodb
      GARMIN_TOKEN_DIR: /home/appuser/.garminconnect
    depends_on:
      timescaledb:
        condition: service_healthy
      mongodb:
        condition: service_healthy
    volumes:
      - garmin_tokens:/home/appuser/.garminconnect
    restart: on-failure:3

  # ── CLI commands (run with: docker compose run --rm garmin-cli <command>) ──
  garmin-cli:
    build: .
    env_file: .env
    environment:
      POSTGRES_HOST: timescaledb
      MONGO_HOST: mongodb
      GARMIN_TOKEN_DIR: /home/appuser/.garminconnect
    depends_on:
      timescaledb:
        condition: service_healthy
      mongodb:
        condition: service_healthy
    volumes:
      - garmin_tokens:/home/appuser/.garminconnect
    stdin_open: true
    tty: true
    entrypoint: ["garmin-server"]
    command: ["--help"]
    profiles:
      - cli

  # ── MCP server (HTTP, for AI/LLM integration) ───────────────────
  garmin-mcp:
    build: .
    env_file: .env
    environment:
      POSTGRES_HOST: timescaledb
      MONGO_HOST: mongodb
      MCP_TRANSPORT: sse
      MCP_HOST: "0.0.0.0"
      MCP_PORT: "8080"
    ports:
      - "${MCP_PORT:-8080}:8080"
    depends_on:
      timescaledb:
        condition: service_healthy
    entrypoint: ["garmin-server"]
    command: ["mcp"]
    restart: unless-stopped

volumes:
  timescaledb_data:
  mongodb_data:
  grafana_data:
  garmin_tokens:
