services:
  timescaledb:
    image: timescale/timescaledb:latest-pg16
    ports:
      - "127.0.0.1:5432:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-garmin}
      POSTGRES_USER: ${POSTGRES_USER:-garmin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-garmin_secret}
    volumes:
      - timescaledb_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-garmin}"]
      interval: 5s
      timeout: 5s
      retries: 5

  mongodb:
    image: mongo:7
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USER:-garmin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD}
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "-u", "${MONGO_ROOT_USER:-garmin}", "-p", "${MONGO_ROOT_PASSWORD}", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Garmin Server (daemon mode) ──────────────────────────────────
  garmin-server:
    build: .
    env_file: .env
    environment:
      POSTGRES_HOST: host.docker.internal
      MONGO_HOST: mongodb
      GARMIN_TOKEN_DIR: /home/appuser/.garminconnect
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      timescaledb:
        condition: service_healthy
      mongodb:
        condition: service_healthy
    volumes:
      - garmin_tokens:/home/appuser/.garminconnect
    restart: on-failure:3

  # ── CLI commands (run with: docker compose run --rm garmin-cli <command>) ──
  garmin-cli:
    build: .
    env_file: .env
    environment:
      POSTGRES_HOST: host.docker.internal
      MONGO_HOST: mongodb
      GARMIN_TOKEN_DIR: /home/appuser/.garminconnect
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      timescaledb:
        condition: service_healthy
      mongodb:
        condition: service_healthy
    volumes:
      - garmin_tokens:/home/appuser/.garminconnect
    stdin_open: true
    tty: true
    entrypoint: ["garmin-server"]
    command: ["--help"]
    profiles:
      - cli

  # ── MCP server (HTTP, for AI/LLM integration) ───────────────────
  garmin-mcp:
    build: .
    env_file: .env
    environment:
      POSTGRES_HOST: host.docker.internal
      MONGO_HOST: mongodb
      MCP_TRANSPORT: sse
      MCP_HOST: "0.0.0.0"
      MCP_PORT: "8080"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "127.0.0.1:${MCP_PORT:-8080}:8080"
    depends_on:
      timescaledb:
        condition: service_healthy
    entrypoint: ["garmin-server"]
    command: ["mcp"]
    restart: unless-stopped

volumes:
  timescaledb_data:
  mongodb_data:
  garmin_tokens:
