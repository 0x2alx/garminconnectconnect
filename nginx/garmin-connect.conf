# Garmin Connect reverse proxy — TLS termination for MCP and Grafana
#
# Install: sudo ln -sf $(pwd)/nginx/garmin-connect.conf /etc/nginx/sites-enabled/
# Then: sudo nginx -t && sudo systemctl reload nginx

server {
    listen 443 ssl;
    server_name 10.0.0.83;

    ssl_certificate /etc/nginx/ssl/garmin-connect.crt;
    ssl_certificate_key /etc/nginx/ssl/garmin-connect.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    # MCP SSE + messages endpoints
    location /mcp/ {
        proxy_pass http://127.0.0.1:8080/;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 86400s;
    }

    # MCP message POST endpoint (SSE returns /messages/ as a relative path)
    location /messages/ {
        proxy_pass http://127.0.0.1:8080/messages/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
